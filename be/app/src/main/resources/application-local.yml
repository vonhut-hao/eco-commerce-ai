spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flix-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# Health check for local env
management:
  endpoints:
    web:
      exposure:
        include: "env,health,info"
  endpoint:
    env:
      show-values: always


logging:
  level:
    root: INFO
    com.flix: DEBUG
    org.hibernate.SQL: DEBUG